<!DOCTYPE html>
<html>
  <head>
    <title>Blessing Muthivhi Portfolio</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Load a font called Roboto from Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="Styles/header.css">
    <link rel="stylesheet" href="Styles/Sections/home-section.css">
  </head>
  <body>
    <header>
      <div class="header-container">
        <div class="left-section">
          <p class="portfolio-text">My Portfolio</p>
        </div>
        <div class="middle-section">
          <nav class="hero-section">
            <p class="home">Home</p>
            <p class="about">About</p>
            <p class="services">Services</p>
            <p class="experience">Experience</p>
            <p class="projects">Projects</p>
            <p class="contact">Contact</p>
          </nav>
        </div>
        <div class="right-section"> 
          <button class="download-cv-button">Download CV</button>
          <div class="profile-container">
            <p class="Developer">Blessing Front-End Dev</p>
            <img src="Images and Icons/Images/IMG-20240323-WA0003.jpg" alt="profile picture" class="profile-picture"> 
          </div>
          <div class="hamburger">
            &#9776;
          </div>
        </div>
      </div>
    </header>

    <div class="mobile-menu js-mobile-menu">

      <div class="mobile-header js-mobile-header">
        <span class="close-button js-close-button" id="close-menu">&times;</span>
      </div>

      <nav class="mobile-hero">
        <p class="home">Home</p>
        <p class="about">About</p>
        <p class="services">Services</p>
        <p class="experience">Experience</p>
        <p class="projects">Projects</p>
        <p class="contact">Contact</p>
        <button class="mobile-download-cv-button">Download CV</button>
      </nav>
      
    </div>
    <main>
      <section class="home-section">
        <div class="home-container">
          <h1>Hello, I'm Blessing</h1>
          <p>Self-taught frontend developer building responsive and interactive web applications with clean, maintainable code.</p>
          
          <div class="home-section-buttons-container">
            <button class="view-projects-button">
              <img src="Images and Icons/Icons/icons8-external-link-30.png" alt="external icon" class="external-icon">
              View Projects
            </button>
            <button class="contact-me-button">
              <img src="Images and Icons/Icons/icons8-email-48.png" alt="email-icon" class="contact-icon">
              Contact Me
            </button>
          </div>
          <div class="scroll-down-container">
            <p class="scroll-down-text">scroll down</p>
            <img src="Images and Icons/Icons/icons8-scroll-down-48.png" alt="scroll down icon" class="scroll-down-icon">
          </div>
        </div>
      </section>
    </main>
    <script src="Scripts/header.js"></script>
  </body>
</html>
